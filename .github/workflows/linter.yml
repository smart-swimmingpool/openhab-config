---
###########################
###########################
## Linter GitHub Actions ##
###########################
###########################
name: Lint Code Base

#
# Documentation:
# https://help.github.com/en/articles/workflow-syntax-for-github-actions
#

#############################
# Start the job on all push #
#############################
on:
  push:
    branches-ignore:
      - "main"
      - "master"
  pull_request:

# Cancel in-progress runs for the same workflow+ref when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

###############
# Set the Job #
###############
jobs:
  mega-linter:
    name: MegaLinter
    runs-on: ubuntu-latest

    permissions:
      contents: read
      statuses: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run MegaLinter
        uses: oxsecurity/megalinter@v7
        env:
          # MegaLinter configuration
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Enable relevant linters for OpenHAB config (YAML/JSON)
          ENABLE: YAML,JSON,EDITORCONFIG

          # Disable others
          DISABLE: BASH,CLANG_FORMAT,CLANG_TIDY,COPYPASTE,CPP,DOCKERFILE,GO,GROOVY,HTML,JAVA,JAVASCRIPT,KOTLIN,MARKDOWN,OPENAPI,PERL,PHP,PYTHON,RUBY,RUST,SCALA,SHELL,SQL,TERRAFORM,TSQL,XML

          # Exclude workflow files and YAML/JSON files (to avoid false positives)
          FILTER_REGEX_EXCLUDE: ".*/(\.github)/.*|.*\.(yml|yaml|json)$"

          # Don't treat warnings as errors
          WARNINGS_AS_ERRORS: false

          # Logging
          LOG_LEVEL: NOTICE
