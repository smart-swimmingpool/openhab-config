# MegaLinter Configuration for OpenHAB Config Module
# Replaces Super-Linter with equivalent rules
# https://megalinter.io/latest/configuration/

---
# Enable only the linters that were enabled in Super-Linter
# OpenHAB Config module has no C++ code, so we exclude CPP
ENABLE:
  - BASH
  - EDITORCONFIG
  - GITHUB_ACTIONS
  - GITLEAKS
  - JSON
  - MARKDOWN
  - YAML

# Disable all other linters
DISABLE:
  - ALL

# Filter patterns - exclude build artifacts and dependencies
# Must be a string, not a list
FILTER_REGEX_EXCLUDE: |
  .*/(\.github|\.vscode|build|\.git|node_modules|docs|configurations|services|things|items|rules|scripts|transform)/.*
  .*\.min\.(js|css)

# Markdown specific settings - line length 150
MARKDOWN_LINT_LINE_LENGTH: 150

# Use custom configuration files
MARKDOWNLINT_CONFIG_FILE: .markdownlint.yml
YAMLLINT_CONFIG_FILE: .yamllint.yml

# Don't treat warnings as errors
WARNINGS_AS_ERRORS: false

# Logging
LOG_LEVEL: NOTICE

# Parallel execution
PARALLEL: false
